<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>20AI Assistant</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:30px;
}

.new-chat{
padding:10px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.chat-list{
flex:1;
overflow-y:auto;
}

.chat-item{
padding:8px;
border-radius:6px;
cursor:pointer;
margin-bottom:5px;
}

.chat-item:hover{
background:#1e293b;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.topbar{
padding:15px;
background:#020617;
border-bottom:1px solid #1e293b;
}

/* CHAT AREA */

.messages{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:12px 16px;
border-radius:10px;
max-width:70%;
}

.user{
background:#38bdf8;
color:black;
align-self:flex-end;
}

.bot{
background:#1e293b;
}

/* INPUT AREA */

.input-area{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

button.send{
margin-left:10px;
padding:12px 18px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
display:none;
}

.message{
max-width:90%;
}

}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">20AI</div>

<button class="new-chat" onclick="newChat()">New Chat</button>

<div class="chat-list" id="chatList"></div>

</div>


<!-- MAIN -->

<div class="main">

<div class="topbar">
20AI Assistant
</div>

<div class="messages" id="messages"></div>

<div class="input-area">

<input id="messageInput" placeholder="Ask anything..." />

<button class="send" onclick="sendMessage()">Send</button>

</div>

</div>


<script>

const input = document.getElementById("messageInput")
const messages = document.getElementById("messages")

let conversation = [
{
role:"system",
content:"You are 20AI, an intelligent assistant helping entrepreneurs and developers."
}
]

async function sendMessage(){

const text = input.value.trim()

if(!text) return

messages.innerHTML += `<div class="message user">${text}</div>`

input.value=""

const thinking = document.createElement("div")
thinking.className="message bot"
thinking.innerText="Thinking..."
messages.appendChild(thinking)

messages.scrollTop = messages.scrollHeight

conversation.push({
role:"user",
content:text
})

try{

const response = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:conversation
})
})

const data = await response.json()

thinking.innerText=data.reply

conversation.push({
role:"assistant",
content:data.reply
})

messages.scrollTop = messages.scrollHeight

}catch(err){

thinking.innerText="Server error"

}

}


/* ENTER KEY */

input.addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
sendMessage()
}

})


/* NEW CHAT */

function newChat(){

messages.innerHTML=""

conversation=[
{
role:"system",
content:"You are 20AI, an intelligent assistant helping entrepreneurs and developers."
}
]

}

</script>

</body>
</html>

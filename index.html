<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>20AI</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
}

.logo img{
height:36px;
margin-bottom:20px;
}

.new-chat{
padding:10px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.chat-list{
flex:1;
overflow-y:auto;
}

.chat-item{
padding:8px;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
}

.chat-item:hover{
background:#1e293b;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:15px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.messages{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:12px 16px;
border-radius:10px;
max-width:70%;
}

.user{
background:#38bdf8;
color:black;
align-self:flex-end;
}

.assistant{
background:#1e293b;
}

.input-area{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
}

textarea{
flex:1;
padding:12px;
border:none;
border-radius:8px;
resize:none;
height:40px;
}

button.send{
margin-left:10px;
padding:12px 18px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.png">
</div>

<button class="new-chat" onclick="newChat()">New Chat</button>

<div class="chat-list" id="chatList"></div>

</div>

<div class="main">

<div class="topbar">Malcolm</div>

<div class="messages" id="messages"></div>

<div class="input-area">

<textarea id="messageInput" placeholder="Ask anything..."></textarea>

<button class="send" id="sendBtn">Send</button>

</div>

</div>

<script>

const supabase = supabase.createClient(
"https://supabase.com/dashboard/project/cyudprlnxebosgucgedwL",
"sb_publishable_S6PGlU0wDdu0xqYRJAVDiQ_6_buPlwK"
)

const input = document.getElementById("messageInput")
const sendBtn = document.getElementById("sendBtn")
const messages = document.getElementById("messages")
const chatList = document.getElementById("chatList")

let currentChat = null

/* LOAD CHATS */

async function loadChats(){

const { data } = await supabase
.from("chats")
.select("*")
.order("created_at",{ascending:false})

chatList.innerHTML=""

data.forEach(chat => {

const item=document.createElement("div")
item.className="chat-item"
item.innerText=chat.title

item.onclick=()=>{
currentChat=chat.id
loadMessages(chat.id)
}

chatList.appendChild(item)

})

}

/* LOAD MESSAGES */

async function loadMessages(chatId){

const { data } = await supabase
.from("messages")
.select("*")
.eq("chat_id",chatId)
.order("created_at")

messages.innerHTML=""

data.forEach(m => {

messages.innerHTML+=`
<div class="message ${m.role}">
${m.content}
</div>
`

})

messages.scrollTop=messages.scrollHeight

}

/* CREATE NEW CHAT */

async function newChat(){

const { data } = await supabase
.from("chats")
.insert([{title:"New Chat"}])
.select()

currentChat=data[0].id

loadChats()
loadMessages(currentChat)

}

/* SEND MESSAGE */

async function sendMessage(){

const text=input.value.trim()

if(!text) return

if(!currentChat) await newChat()

messages.innerHTML+=`<div class="message user">${text}</div>`

input.value=""

const thinking=document.createElement("div")
thinking.className="message assistant"
thinking.innerText="Thinking..."
messages.appendChild(thinking)

messages.scrollTop=messages.scrollHeight

await supabase.from("messages").insert({
chat_id:currentChat,
role:"user",
content:text
})

const response=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})

const data=await response.json()

thinking.innerText=data.reply

await supabase.from("messages").insert({
chat_id:currentChat,
role:"assistant",
content:data.reply
})

}

/* BUTTON */

sendBtn.addEventListener("click",sendMessage)

/* ENTER */

input.addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
sendMessage()
}

})

loadChats()

</script>

</body>
</html>

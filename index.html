<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>20AI</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
}

.logo img{
height:36px;
margin-bottom:20px;
}

.new-chat{
padding:10px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:15px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.messages{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:12px 16px;
border-radius:10px;
max-width:70%;
}

.user{
background:#38bdf8;
color:black;
align-self:flex-end;
}

.bot{
background:#1e293b;
}

.input-area{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
}

textarea{
flex:1;
padding:12px;
border:none;
border-radius:8px;
resize:none;
height:40px;
}

button.send{
margin-left:10px;
padding:12px 18px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.png">
</div>

<button class="new-chat" onclick="newChat()">New Chat</button>

</div>

<div class="main">

<div class="topbar">
20AI Assistant
</div>

<div class="messages" id="messages"></div>

<div class="input-area">

<textarea id="messageInput" placeholder="Ask anything..."></textarea>

<button class="send" id="sendBtn">Send</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
